; HDC Sense & Control Node - ESP32-S3-ETH (W5500 SPI Ethernet)
; Data center environmental monitoring node
;   - SNMPv2c (private community) -> Zabbix
;   - HTTPS web UI + authenticated REST API for monitoring & control
;
; Uses the pioarduino platform to get arduino-esp32 3.x, which exposes the
; W5500 as a standard lwIP interface (required for TLS / HTTPS over Ethernet).

[platformio]
; Local, git-ignored overrides (dev WiFi creds, dev admin password, upload port).
; Copy secrets.example.ini -> secrets.local.ini and fill it in. Missing file is
; silently ignored, so production/CI builds work without any secrets present.
extra_configs = secrets.local.ini

; Secrets injected from secrets.local.ini; empty by default (no baked-in creds).
[secrets]
build_flags =

[env:esp32-s3-eth]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
board     = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

build_flags =
  -DCORE_DEBUG_LEVEL=1
  -DARDUINOJSON_ENABLE_ARDUINO_STRING=1
  ; Route Serial to the built-in USB-Serial-JTAG (frees UART0 GPIO43/44 for contacts)
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  ; Dev-only credential defaults come from secrets.local.ini (git-ignored).
  ${secrets.build_flags}

lib_deps =
  adafruit/Adafruit SHT31 Library@^2.2.0
  adafruit/Adafruit BusIO@^1.14.2
  bblanchon/ArduinoJson@^7.0.0
  https://github.com/shortbloke/Arduino_SNMP.git

; --- Per-node fleet builds -------------------------------------------------
; Identity/location come from persisted settings (web UI) or one-off build
; overrides; the MAC is derived automatically from the chip ID.
