; Template for local dev overrides.
; Copy to secrets.local.ini (git-ignored) and fill in.
; Injected into the build via [platformio] extra_configs in platformio.ini.
;
; Leaving DEFAULT_WIFI_* unset => WiFi is off until configured in the web UI.
; Leaving DEFAULT_ADMIN_PASSWORD unset => each unit generates a unique random
; admin password at first boot (printed once to the serial console).

[secrets]
build_flags =
  -DDEFAULT_WIFI_SSID='"your-ssid"'
  -DDEFAULT_WIFI_PASS='"your-wifi-password"'
  -DDEFAULT_ADMIN_PASSWORD='"your-initial-admin-password"'

[env:esp32-s3-eth]
; upload_port  = /dev/cu.usbmodemXXXX
; monitor_port = /dev/cu.usbmodemXXXX
